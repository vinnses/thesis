services:
  texservice:
    container_name: drugslm-thesis
    build:
      context: .
      dockerfile: Dockerfile
      target: ${TEXLIVE:-minimal}
      args:
        TEXUSER: ${TEXUSER}
        TEXUID: ${TEXUID}
        TEXGID: ${TEXGID}
        CTAN_MIRROR: ${CTAN_MIRROR:-}
        LATEXCTL_REPOSITORY: ${LATEXCTL_REPOSITORY:-https://github.com/vinnses/latexctl.git}
        LATEXCTL_REF: ${LATEXCTL_REF:-main}
    image: teximage:${TEXLIVE:-minimal}
    hostname: ${COMPOSE_PROJECT_NAME}
    working_dir: /workspace
    env_file:
      - .env
      - path: .secrets/jupyter.env
        required: false
    environment:
      CTAN_MIRROR: ${CTAN_MIRROR:-}
      JUPYTER_ENABLED: ${JUPYTER_ENABLED:-1}
      JUPYTER_PORT: 8888
      JUPYTER_TOKEN: ""
    expose:
      - "8888"
    tty: true
    stdin_open: true
    command: sleep infinity
    volumes:
      - ./:/workspace
      - texdata:/texdata
      - sshdata:/etc/ssh
      - ${HOME}/.gitconfig:/home/${TEXUSER}/.gitconfig:ro
      - ${SSH_AUTHORIZED_KEYS_FILE:-./.secrets/authorized_keys}:/run/secrets/authorized_keys:ro
    networks:
      - mestrado_network

volumes:
  texdata:
  sshdata:

networks:
  mestrado_network:
    name: mestrado_network
    external: true
